name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dist bundles
        run: npm run build

      - name: Verify committed dist is fresh
        run: git diff --exit-code -- dist

      - name: Verify native agents
        run: npm run verify:native-agents

      - name: Verify omakase learn
        run: npm run verify:learn

      - name: Verify factory gate reports
        run: npm run verify:gate-reports

      - name: Verify Class 2 PR gate diff
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          GITHUB_HEAD_SHA: ${{ github.sha }}
        run: npm run verify:pr-gate-diff

      - name: Verify scenario evals
        run: npm run verify:scenario-evals

      - name: Verify skill/dist drift
        run: npm run verify:drift